# Start non-login shell so .bashrc is sourced in every new window/pane
set -g default-command "${SHELL}"

# Extended keys (required for Shift+Enter newlines in Claude Code)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Allow passthrough for notifications, progress bars, and the OSC 52
# clipboard helper below.
set -g allow-passthrough on

# Mouse + clipboard
set -g mouse on
# tmux's native set-clipboard is silently dropped over mosh on this stack,
# so copies are routed through a DCS-passthrough helper instead. See
# README.md "Clipboard / OSC 52" for the why.
set -g set-clipboard off

# vi-style copy mode with v/y bindings; pipe through DCS-passthrough helper
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.tmux/copy-osc52 '#{pane_tty}'"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/.tmux/copy-osc52 '#{pane_tty}'"
unbind -T copy-mode MouseDragEnd1Pane

# Performance
set -sg escape-time 0
set -g focus-events off
set -g history-limit 50000

# Colors
set -g default-terminal "tmux-256color"

# Status bar
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[bg=colour25,fg=colour255,bold] #S #[bg=colour235] "
set -g status-left-length 20
set -g status-right "#[fg=colour243] %H:%M "

# Window tabs: inactive
set -g window-status-format " #I:#W "

# Window tabs: active (stands out clearly)
set -g window-status-current-format "#[bg=colour25,fg=colour255,bold] #I:#W #[bg=colour235]"

# Dim separator between tabs
set -g window-status-separator "#[fg=colour240]|"

# Activity alert styling
set -g window-status-activity-style "fg=colour214"
